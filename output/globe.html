<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lictor Globe — world risk heatmap</title>
<style>
  :root{ --bg:#070809; --panel:#11141a; --copper:#c4885a; --cream:#f4dcc4; --muted:#8e887b; --line:rgba(196,136,90,.18); }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#ece3d6;font-family:Inter,system-ui,sans-serif;overflow:hidden}
  header{display:flex;align-items:center;gap:1rem;padding:.9rem 1.4rem;border-bottom:1px solid var(--line);background:rgba(5,6,8,.6);backdrop-filter:blur(12px)}
  header h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.4rem;margin:0;color:var(--cream)}
  header .sub{font-size:.78rem;color:var(--muted);font-family:ui-monospace,monospace}
  .stat{margin-left:auto;display:flex;gap:1.5rem;font-family:ui-monospace,monospace;font-size:.8rem}
  .stat b{display:block;color:var(--copper);font-size:1.5rem;line-height:1}
  .stat span{color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em}
  #wrap{display:flex;height:calc(100vh - 64px)}
  #map{flex:1;position:relative}
  svg{width:100%;height:100%;display:block}
  .country{fill:#161a20;stroke:#0b0d11;stroke-width:.3px;transition:fill .3s}
  .country:hover{stroke:var(--copper);stroke-width:.8px}
  aside{width:300px;border-left:1px solid var(--line);padding:1rem 1.1rem;overflow-y:auto;background:var(--panel)}
  aside h2{font-family:'Cormorant Garamond',serif;font-size:1.15rem;margin:.2rem 0 .6rem;color:var(--cream)}
  .zrow{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-top:1px solid var(--line);font-size:.82rem}
  .chip{font-family:ui-monospace,monospace;font-size:.7rem;padding:.1rem .45rem;border-radius:999px;background:rgba(196,136,90,.14);color:var(--copper)}
  .warmbar{height:5px;border-radius:3px;background:linear-gradient(90deg,#3a2a1a,var(--copper))}
  .host{font-family:ui-monospace,monospace;font-size:.72rem;color:var(--muted);padding:.25rem 0;border-top:1px dashed var(--line);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .host b{color:#e9b98c}
  #tip{position:absolute;pointer-events:none;background:#0b0d11;border:1px solid var(--copper);border-radius:8px;padding:.5rem .7rem;font-size:.75rem;font-family:ui-monospace,monospace;opacity:0;transition:opacity .15s;max-width:240px;z-index:5}
  .legend{position:absolute;bottom:14px;left:14px;font-size:.7rem;color:var(--muted);font-family:ui-monospace,monospace}
  .legend i{display:inline-block;width:80px;height:8px;border-radius:4px;background:linear-gradient(90deg,#161a20,#5a3a1f,var(--copper),#ffb066);vertical-align:middle;margin:0 .4rem}
  .err{padding:1rem;color:var(--muted);font-family:ui-monospace,monospace;font-size:.8rem}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>🛰 Lictor Globe</h1>
  <span class="sub">world risk heatmap · warm = exposed surface</span>
  <div class="stat">
    <div><b id="s-hosts">—</b><span>hosts</span></div>
    <div><b id="s-zones">—</b><span>zones</span></div>
    <div><b id="s-warm">—</b><span>warm</span></div>
    <div><b id="s-upd" style="font-size:.8rem">—</b><span>updated</span></div>
  </div>
</header>
<div id="wrap">
  <div id="map"><div id="tip"></div>
    <div class="legend">cool <i></i> warm</div>
  </div>
  <aside>
    <h2>Warm zones</h2>
    <div id="zones"></div>
    <h2 style="margin-top:1.2rem">Warmest hosts</h2>
    <div id="hosts"></div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
// ISO 3166-1 alpha-2 → numeric (world-atlas country ids). Covers the corpora geos + majors.
const A2NUM={IL:"376",DE:"276",GB:"826",FR:"250",BR:"76",IN:"356",JP:"392",AU:"36",CA:"124",NL:"528",ES:"724",IT:"380",RU:"643",CN:"156",KR:"410",SE:"752",CH:"756",SG:"702",AE:"784",SA:"682",ZA:"710",MX:"484",PL:"616",TR:"792",NO:"578",FI:"246",DK:"208",BE:"56",AT:"40",IE:"372",PT:"620",GR:"300",CZ:"203",RO:"642",HU:"348",US:"840",UA:"804",ID:"360",TH:"764",VN:"704",PH:"608",MY:"458",NG:"566",EG:"818",AR:"32",CL:"152",CO:"170",NZ:"554"};
const heat = d3.scaleSequential(t=>d3.interpolateRgb("#161a20", "#ffb066")(Math.pow(t,0.7))).domain([0,1]);

const tip=document.getElementById('tip');
async function load(){
  let data, world;
  try{
    [data, world] = await Promise.all([
      fetch('./globe-heatmap.json?cb='+Date.now()).then(r=>r.json()),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json())
    ]);
  }catch(e){ document.getElementById('map').insertAdjacentHTML('beforeend','<div class="err">Heatmap data not available yet — run <code>globe-patrol.py</code> first. ('+e+')</div>'); return; }

  document.getElementById('s-hosts').textContent=(data.total_scanned||0).toLocaleString();
  document.getElementById('s-zones').textContent=data.countries||0;
  document.getElementById('s-warm').textContent=data.total_warm||0;
  document.getElementById('s-upd').textContent=(data.generated||'').slice(11,16)||'—';

  // numeric-id → warmth
  const byNum={}; for(const [cc,z] of Object.entries(data.zones||{})){ if(A2NUM[cc]) byNum[A2NUM[cc]]={cc,...z}; }

  const map=document.getElementById('map');
  const W=map.clientWidth, H=map.clientHeight;
  const svg=d3.select('#map').append('svg').attr('viewBox',`0 0 ${W} ${H}`);
  const countries=topojson.feature(world, world.objects.countries).features;
  const proj=d3.geoNaturalEarth1().fitSize([W,H], {type:"FeatureCollection",features:countries});
  const path=d3.geoPath(proj);
  svg.append('g').selectAll('path').data(countries).join('path')
    .attr('class','country').attr('d',path)
    .attr('fill',d=>{const z=byNum[d.id]; return z?heat(z.warmth):'#161a20';})
    .on('mousemove',(ev,d)=>{const z=byNum[d.id]; const r=map.getBoundingClientRect();
      tip.style.left=(ev.clientX-r.left+14)+'px'; tip.style.top=(ev.clientY-r.top+14)+'px'; tip.style.opacity=1;
      tip.innerHTML = z ? `<b style="color:var(--copper)">${d.properties.name} [${z.cc}]</b><br>warmth ${z.warmth} · warm ${z.warm}/${z.alive}<br>max risk ${z.max_risk} · catch-all ${z.catchall}<br>${Object.keys(z.signals||{}).join(', ')||'—'}` : `<b>${d.properties.name}</b><br><span style="color:var(--muted)">not scanned</span>`;})
    .on('mouseleave',()=>tip.style.opacity=0);

  // side panels
  const zones=Object.entries(data.zones||{}).filter(([,z])=>z.warm>0||z.warmth>0).slice(0,20);
  document.getElementById('zones').innerHTML = zones.length ? zones.map(([cc,z])=>
    `<div class="zrow"><span><span class="chip">${cc}</span> ${z.warm}/${z.alive} warm</span><span style="color:var(--muted)">r${z.max_risk}</span></div>
     <div class="warmbar" style="width:${Math.round(z.warmth*100)}%"></div>`).join('') : '<div class="host">No warm zones yet — scans accumulate over time.</div>';
  document.getElementById('hosts').innerHTML = (data.top_warm_hosts||[]).slice(0,25).map(h=>
    `<div class="host"><b>[${h.cc}]</b> ${h.host} <span style="color:var(--copper)">r${h.risk}</span><br>${(h.signals||[]).join(', ')}</div>`).join('') || '<div class="host">—</div>';
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
