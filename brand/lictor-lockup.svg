<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lictor AI — full lockup (mark + wordmark, horizontal).

  Use for footers, press kit, anywhere a brand block is needed. Wordmark
  set in Cormorant Garamond per the brand doc; falls back to a system serif
  on platforms without the font.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" role="img" aria-label="Lictor AI">
  <!-- Mark, sized to fill 200×200 on the left -->
  <g transform="translate(20, 20) scale(0.78125)">
    <path d="
      M 56 96
      C 56 56  88 40  128 40
      C 168 40 200 56 200 96
      L 200 168
      C 200 188 188 200 172 204
      L 172 224
      L 148 224
      L 148 208
      L 108 208
      L 108 224
      L 84 224
      L 84 204
      C 68 200 56 188 56 168
      Z" fill="#3D2C5E" />
    <path d="
      M 96 108
      L 160 108
      L 160 132
      L 134 132
      L 134 168
      L 122 168
      L 122 132
      L 96 132
      Z" fill="#0F1419" />
    <rect x="44" y="56" width="168" height="14" rx="3" fill="#3D2C5E" />
    <rect x="60" y="20" width="136" height="44" rx="6" fill="#C9A23B" />
    <g stroke="#0F1419" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="68" y1="32" x2="188" y2="32" />
      <line x1="68" y1="52" x2="188" y2="52" />
      <line x1="84"  y1="32" x2="84"  y2="52" />
      <line x1="108" y1="32" x2="108" y2="52" />
      <line x1="148" y1="32" x2="148" y2="52" />
      <line x1="172" y1="32" x2="172" y2="52" />
      <line x1="96"  y1="32" x2="96"  y2="24" />
      <line x1="128" y1="32" x2="128" y2="24" />
      <line x1="160" y1="32" x2="160" y2="24" />
    </g>
    <g fill="#F5F1E8">
      <circle cx="84"  cy="32" r="2.5" />
      <circle cx="108" cy="32" r="2.5" />
      <circle cx="148" cy="32" r="2.5" />
      <circle cx="172" cy="32" r="2.5" />
      <circle cx="84"  cy="52" r="2.5" />
      <circle cx="108" cy="52" r="2.5" />
      <circle cx="148" cy="52" r="2.5" />
      <circle cx="172" cy="52" r="2.5" />
      <circle cx="96"  cy="24" r="2.5" />
      <circle cx="128" cy="24" r="2.5" />
      <circle cx="160" cy="24" r="2.5" />
    </g>
  </g>

  <!-- Wordmark — sized to fit "Lictor AI" inside ~720 horizontal units -->
  <text x="240" y="150"
        font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
        font-weight="700"
        font-size="110"
        letter-spacing="2"
        fill="#3D2C5E">Lictor</text>
  <text x="563" y="150"
        font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
        font-weight="500"
        font-size="110"
        letter-spacing="2"
        fill="#C9A23B">AI</text>

  <!-- Tagline -->
  <text x="244" y="186"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="20"
        letter-spacing="0.5"
        fill="#6E7780">The bodyguard your AI didn’t ship with.</text>
</svg>
