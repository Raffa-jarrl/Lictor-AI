<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lictor AI — primary mark.

  Concept: Praetorian Guard helmet (frontal view) with a transverse crest.
  The crest is rendered as a row of circuit board "vias" connected by traces,
  signaling AI security without resorting to literal "shield" iconography.

  Brand palette (lictor-ai/docs BRAND.md):
    Imperial Purple  #3D2C5E   helmet body
    Gold Leaf        #C9A23B   crest, circuit vias
    Charcoal         #0F1419   visor cutout, void
    Bone             #F5F1E8   inner traces (high contrast on gold)

  Designed with a strong silhouette so the mark is legible at 16×16.
  Replace with a designer's pass before Web Store submission.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Lictor">
  <!-- Helmet body: skull + cheek pieces -->
  <path d="
    M 56 96
    C 56 56  88 40  128 40
    C 168 40 200 56 200 96
    L 200 168
    C 200 188 188 200 172 204
    L 172 224
    L 148 224
    L 148 208
    L 108 208
    L 108 224
    L 84 224
    L 84 204
    C 68 200 56 188 56 168
    Z"
    fill="#3D2C5E" />

  <!-- Visor / face opening: T-shape -->
  <path d="
    M 96 108
    L 160 108
    L 160 132
    L 134 132
    L 134 168
    L 122 168
    L 122 132
    L 96 132
    Z"
    fill="#0F1419" />

  <!-- Crest base (where the crest meets the skull) -->
  <rect x="44" y="56" width="168" height="14" rx="3" fill="#3D2C5E" />

  <!-- Crest body: gold rectangle that sits on the skull -->
  <rect x="60" y="20" width="136" height="44" rx="6" fill="#C9A23B" />

  <!-- Circuit traces inside the crest: horizontal trunks + vias.
       Reads as "circuit board" at any size > 32px; below that, the gold
       block reads as a Praetorian crest. Both interpretations are correct. -->
  <g stroke="#0F1419" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- top trunk -->
    <line x1="68" y1="32" x2="188" y2="32" />
    <!-- bottom trunk -->
    <line x1="68" y1="52" x2="188" y2="52" />
    <!-- vertical vias connecting the trunks -->
    <line x1="84" y1="32" x2="84" y2="52" />
    <line x1="108" y1="32" x2="108" y2="52" />
    <line x1="148" y1="32" x2="148" y2="52" />
    <line x1="172" y1="32" x2="172" y2="52" />
    <!-- short branches up out of the top trunk -->
    <line x1="96" y1="32" x2="96" y2="24" />
    <line x1="128" y1="32" x2="128" y2="24" />
    <line x1="160" y1="32" x2="160" y2="24" />
  </g>

  <!-- Solder pads (small filled circles) at the via intersections. Bone
       color so they pop against the gold. -->
  <g fill="#F5F1E8">
    <circle cx="84"  cy="32" r="2.5" />
    <circle cx="108" cy="32" r="2.5" />
    <circle cx="148" cy="32" r="2.5" />
    <circle cx="172" cy="32" r="2.5" />
    <circle cx="84"  cy="52" r="2.5" />
    <circle cx="108" cy="52" r="2.5" />
    <circle cx="148" cy="52" r="2.5" />
    <circle cx="172" cy="52" r="2.5" />
    <circle cx="96"  cy="24" r="2.5" />
    <circle cx="128" cy="24" r="2.5" />
    <circle cx="160" cy="24" r="2.5" />
  </g>
</svg>
