<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lictor AI — monochrome mark.

  Single-color version for embroidery, single-color print, dark backgrounds
  where the gold/purple combo doesn't render well. `currentColor` makes the
  whole thing inherit the parent's text color when embedded in HTML/CSS.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Lictor">
  <g fill="currentColor">
    <path d="
      M 56 96
      C 56 56  88 40  128 40
      C 168 40 200 56 200 96
      L 200 168
      C 200 188 188 200 172 204
      L 172 224
      L 148 224
      L 148 208
      L 108 208
      L 108 224
      L 84 224
      L 84 204
      C 68 200 56 188 56 168
      Z" />

    <rect x="44" y="56" width="168" height="14" rx="3" />
    <rect x="60" y="20" width="136" height="44" rx="6" />
  </g>

  <!-- Visor cutout: filled with the contrast color. Use background. -->
  <path d="
    M 96 108
    L 160 108
    L 160 132
    L 134 132
    L 134 168
    L 122 168
    L 122 132
    L 96 132
    Z"
    fill="white" />

  <!-- Crest detail in negative space: knock-out lines so the mark reads
       even when the crest is the same color as the helmet. -->
  <g stroke="white" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="68" y1="32" x2="188" y2="32" />
    <line x1="68" y1="52" x2="188" y2="52" />
    <line x1="84"  y1="32" x2="84"  y2="52" />
    <line x1="108" y1="32" x2="108" y2="52" />
    <line x1="148" y1="32" x2="148" y2="52" />
    <line x1="172" y1="32" x2="172" y2="52" />
  </g>
</svg>
