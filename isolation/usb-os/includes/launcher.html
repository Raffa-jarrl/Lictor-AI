<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lictor Isolation OS</title>
<style>
  :root{--bg:#070809;--copper:#c4885a;--cream:#f4dcc4;--muted:#9a9387}
  *{box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
  body{margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
       background:radial-gradient(ellipse at top,#11141a,var(--bg));color:#ece3d6}
  h1{font-size:1.4rem;color:var(--cream);font-weight:600;margin:.2rem}
  .tag{color:var(--muted);font-size:.85rem;margin-bottom:2.2rem;font-family:ui-monospace,monospace}
  .grid{display:flex;gap:1.1rem;flex-wrap:wrap;justify-content:center;max-width:680px}
  a.vendor{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;
     width:150px;height:130px;border:1px solid rgba(196,136,90,.25);border-radius:16px;text-decoration:none;
     color:#ece3d6;background:rgba(196,136,90,.05);transition:transform .15s,border-color .15s,background .15s}
  a.vendor:hover{transform:translateY(-4px);border-color:var(--copper);background:rgba(196,136,90,.12)}
  .ico{font-size:2rem}
  .name{font-weight:600}
  .lock{margin-top:2.4rem;color:var(--muted);font-size:.78rem;font-family:ui-monospace,monospace;text-align:center;line-height:1.6}
  .lock b{color:var(--copper)}
</style>
</head>
<body>
  <h1>🔒 Lictor Isolation OS</h1>
  <div class="tag">your AI, your accounts — zero access to your network</div>
  <div class="grid">
    <a class="vendor" href="https://claude.ai"><span class="ico">🟠</span><span class="name">Claude</span></a>
    <a class="vendor" href="https://chatgpt.com"><span class="ico">🟢</span><span class="name">ChatGPT</span></a>
    <a class="vendor" href="https://gemini.google.com"><span class="ico">🔵</span><span class="name">Gemini</span></a>
    <a class="vendor" href="https://aistudio.google.com"><span class="ico">✨</span><span class="name">AI Studio</span></a>
    <a class="vendor" href="https://github.com/copilot"><span class="ico">🐙</span><span class="name">Copilot</span></a>
  </div>
  <div class="lock">
    <b>🔴 red zone</b> — this workspace · <b>⚫ black zone</b> — your real network, unreachable<br/>
    Files live only in <b>~/projects</b>. Pull the stick out and there's no trace.
  </div>
</body>
</html>
