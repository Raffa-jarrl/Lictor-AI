name: Release

# Two things, cleanly separated:
#
#  1. ARTIFACTS (automatic on tag): build every component's downloadable artifact
#     and attach them to a GitHub Release. Safe — produces files, publishes nothing
#     to a package registry.
#
#  2. REGISTRY PUBLISH (manual + gated): publishing to npm / PyPI / crates.io is
#     deliberate and irreversible, so it ONLY runs via a manual run with
#     `publish: true` AND through the protected `release` environment (configure
#     required reviewers + the *_TOKEN secrets in repo Settings → Environments).
#     Each step also no-ops if its token is absent, so a misfire can't publish.
#
# Tag to cut a release:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Also publish to public registries (npm/PyPI/crates). Needs tokens + approval.'
        type: boolean
        default: false

permissions:
  contents: write   # create releases + upload assets

jobs:
  # ── 1. CLI prebuilt binaries (per platform) ────────────────────────────────
  cli-binaries:
    name: CLI ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple silicon
            target: aarch64-apple-darwin
            asset: lictor-darwin-aarch64
          - os: macos-13       # Intel mac
            target: x86_64-apple-darwin
            asset: lictor-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: lictor-linux-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release -p lictor-cli --target ${{ matrix.target }}
      - name: Package tarball
        run: |
          mkdir -p stage
          cp target/${{ matrix.target }}/release/lictor stage/${{ matrix.asset }}
          tar -czf ${{ matrix.asset }}.tar.gz -C stage ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  # ── 1. Extensions + package tarballs (Chrome zip, .vsix, npm tgz, py wheel) ─
  bundles:
    name: Extensions + packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (for Shield WASM)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 9 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: python -m pip install --upgrade pip build

      - name: Shield zip
        working-directory: shield
        run: pnpm install --frozen-lockfile=false && pnpm wasm && pnpm run package
      - name: VS Code .vsix
        working-directory: vscode-extension
        run: pnpm install --frozen-lockfile=false && pnpm run package
      - name: Sentinel npm tarball
        working-directory: sentinel
        run: pnpm install --frozen-lockfile=false && pnpm build && pnpm pack --pack-destination ..
      - name: Airlock npm tarball
        working-directory: airlock
        run: pnpm install --frozen-lockfile=false && pnpm run build && pnpm pack --pack-destination ..
      - name: Sentinel Python wheel + sdist
        working-directory: sentinel-py
        run: python -m build -o ..

      - name: Collect
        run: |
          mkdir -p bundles
          cp shield/lictor-shield-*.zip bundles/ 2>/dev/null || true
          cp vscode-extension/lictor-*.vsix bundles/ 2>/dev/null || true
          cp lictor-sentinel-*.tgz bundles/ 2>/dev/null || true
          cp lictor-airlock-*.tgz bundles/ 2>/dev/null || true
          cp lictor_sentinel-*.whl lictor_sentinel-*.tar.gz bundles/ 2>/dev/null || true
          ls -lh bundles/
      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: bundles/

  # ── 1. Create the GitHub Release with everything attached ──────────────────
  github-release:
    name: Publish GitHub Release
    needs: [cli-binaries, bundles]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' -o -name '*.tgz' -o -name '*.whl' \) -exec cp {} release/ \;
          ls -lh release/
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag || gh release upload "${GITHUB_REF_NAME}" release/* --repo "${GITHUB_REPOSITORY}" --clobber

  # ── 2. GATED registry publish (manual + protected environment only) ─────────
  publish-npm:
    name: Publish npm (sentinel + airlock)
    needs: bundles
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    environment: release          # configure required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: 'https://registry.npmjs.org' }
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with: { version: 9 }
      - name: Guard — token must be present
        run: |
          [ -n "${NODE_AUTH_TOKEN}" ] || { echo "::error::NPM_TOKEN not set in the 'release' environment — refusing to publish"; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lictor/sentinel
        working-directory: sentinel
        run: pnpm install --frozen-lockfile=false && pnpm build && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lictor/airlock
        working-directory: airlock
        run: pnpm install --frozen-lockfile=false && pnpm run build && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish PyPI (lictor-sentinel)
    needs: bundles
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write            # PyPI Trusted Publishing (no token needed if configured)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: python -m pip install --upgrade pip build twine
      - name: Build
        working-directory: sentinel-py
        run: python -m build
      - name: Publish (Trusted Publishing if configured, else PYPI_TOKEN)
        working-directory: sentinel-py
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -n "${TWINE_PASSWORD}" ]; then
            twine upload dist/*
          else
            echo "::warning::PYPI_TOKEN absent — relying on OIDC Trusted Publishing"
            pip install --upgrade twine && twine upload dist/* || { echo "::error::no PyPI credentials"; exit 1; }
          fi

  publish-crates:
    name: Publish crates.io (lictor-core + lictor-cli)
    needs: bundles
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Guard — token must be present
        run: '[ -n "${CARGO_REGISTRY_TOKEN}" ] || { echo "::error::CRATES_TOKEN not set — refusing to publish"; exit 1; }'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - name: Publish core then cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: |
          cargo publish -p lictor-core
          sleep 20   # let the index update so cli can resolve core
          cargo publish -p lictor-cli
